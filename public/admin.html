<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Panel - Cosmo Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .admin-wrap { padding: 28px; max-width: 1100px; margin: 0 auto; }
    .admin-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
    .admin-title { font-size: 30px; font-weight: 700; letter-spacing: -0.7px; }
    .admin-grid { display: grid; grid-template-columns: 380px 1fr; gap: 16px; }
    .panel { background: var(--card2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    .panel-title { font-size: 13px; letter-spacing: 0.7px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; font-weight: 700; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 11px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      outline: none;
      color-scheme: dark;
    }
    .field select, td select {
      background-color: #111522;
      color: #eceef9;
    }
    .field select option, td select option {
      background: #111522;
      color: #eceef9;
    }
    .field input:focus, .field select:focus { border-color: rgba(185,170,255,0.45); box-shadow: 0 0 0 3px rgba(155,140,255,0.14); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .btn-admin {
      border: 1px solid var(--border2);
      border-radius: 10px;
      background: rgba(139,92,246,0.12);
      color: var(--purple2);
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--trans);
    }
    .btn-admin:hover { transform: translateY(-1px); }
    .btn-danger { border-color: rgba(239,68,68,0.35); color: #fda4af; background: rgba(239,68,68,0.08); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid rgba(185,170,255,0.12); }
    th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); }
    td { font-size: 13px; }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .msg { min-height: 20px; font-size: 12px; margin-top: 6px; }
    .ok { color: #86efac; }
    .err { color: #fda4af; }
    @media (max-width: 960px) { .admin-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="bg-anim"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="layout">
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-text">Cosmo Support</div><div class="logo-sub">Internal Staff Portal</div></div>
    <div class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">•</span> Home</a>
      <a class="nav-item" href="guide.html"><span class="nav-icon">•</span> Support Guide</a>
      <a class="nav-item" href="status.html"><span class="nav-icon">•</span> Live Status</a>
      <a class="nav-item" href="steamdb.html"><span class="nav-icon">•</span> SteamDB Feed</a>
      <a class="nav-item" href="commands.html"><span class="nav-icon">•</span> Bot Commands</a>
      <a class="nav-item active" href="admin.html"><span class="nav-icon">•</span> Admin Panel</a>
    </div>
    <div class="sidebar-footer"><a href="#" data-logout><span>Sign out</span></a></div>
  </nav>

  <main class="main">
    <div class="topbar"><div class="page-title">Admin Panel</div></div>
    <div class="admin-wrap">
      <div class="admin-head">
        <div class="admin-title">User Management</div>
      </div>

      <div class="admin-grid">
        <section class="panel">
          <div class="panel-title">Create User</div>
          <form id="createUserForm">
            <div class="field"><label>Username</label><input id="newUsername" required></div>
            <div class="field"><label>Password</label><input id="newPassword" type="password" required></div>
            <div class="field"><label>Role</label>
              <select id="newRole" required>
                <option>support</option>
                <option>trail support</option>
                <option>head support</option>
                <option>Owner</option>
                <option>msd</option>
              </select>
            </div>
            <div class="btn-row"><button class="btn-admin" type="submit">Create Account</button></div>
          </form>
          <div id="createMsg" class="msg"></div>
        </section>

        <section class="panel">
          <div class="panel-title">Users</div>
          <table>
            <thead><tr><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
            <tbody id="usersTableBody"></tbody>
          </table>
          <div id="tableMsg" class="msg"></div>
        </section>
      </div>
    </div>
  </main>
</div>

<script src="js/cosmic-bg.js"></script>
<script src="js/runtime-config.js"></script>
<script src="js/auth-ui.js"></script>
<script>
const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', (e) => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

function setMsg(elId, text, isError) {
  const el = document.getElementById(elId);
  el.textContent = text || '';
  el.className = 'msg ' + (isError ? 'err' : 'ok');
}

async function loadUsers() {
  try {
    const resp = await cosmoFetch('/api/admin/users');
    const data = await resp.json();
    if (!resp.ok || !data.success) throw new Error(data.error || 'Failed to load users');
    renderUsers(data.users || []);
  } catch (err) {
    setMsg('tableMsg', err.message, true);
  }
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function renderUsers(users) {
  const tbody = document.getElementById('usersTableBody');
  tbody.innerHTML = '';
  users.forEach((u) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(u.username)}</td>
      <td>
        <select data-role-user="${escapeHtml(u.username)}">
          <option ${u.role === 'support' ? 'selected' : ''}>support</option>
          <option ${u.role === 'trail support' ? 'selected' : ''}>trail support</option>
          <option ${u.role === 'head support' ? 'selected' : ''}>head support</option>
          <option ${u.role === 'Owner' ? 'selected' : ''}>Owner</option>
          <option ${u.role === 'msd' ? 'selected' : ''}>msd</option>
        </select>
      </td>
      <td>
        <div class="row-actions">
          <button class="btn-admin" data-save-user="${escapeHtml(u.username)}">Save Role</button>
          <button class="btn-admin" data-pass-user="${escapeHtml(u.username)}">Change Password</button>
          <button class="btn-admin btn-danger" data-del-user="${escapeHtml(u.username)}">Remove</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('[data-save-user]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const username = btn.getAttribute('data-save-user');
      const roleSelect = tbody.querySelector(`[data-role-user="${username}"]`);
      const role = roleSelect.value;
      await updateUser(username, { role });
    });
  });

  tbody.querySelectorAll('[data-pass-user]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const username = btn.getAttribute('data-pass-user');
      const password = prompt('New password for ' + username + ':');
      if (!password) return;
      await updateUser(username, { password });
    });
  });

  tbody.querySelectorAll('[data-del-user]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const username = btn.getAttribute('data-del-user');
      if (!confirm('Remove user ' + username + '?')) return;
      await deleteUser(username);
    });
  });
}

async function updateUser(username, body) {
  try {
    const resp = await cosmoFetch('/api/admin/users/' + encodeURIComponent(username), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) throw new Error(data.error || 'Update failed');
    setMsg('tableMsg', 'Updated ' + username, false);
    await loadUsers();
  } catch (err) {
    setMsg('tableMsg', err.message, true);
  }
}

async function deleteUser(username) {
  try {
    const resp = await cosmoFetch('/api/admin/users/' + encodeURIComponent(username), { method: 'DELETE' });
    const data = await resp.json();
    if (!resp.ok || !data.success) throw new Error(data.error || 'Delete failed');
    setMsg('tableMsg', 'Removed ' + username, false);
    await loadUsers();
  } catch (err) {
    setMsg('tableMsg', err.message, true);
  }
}

document.getElementById('createUserForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value;
  const role = document.getElementById('newRole').value;
  try {
    const resp = await cosmoFetch('/api/admin/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, role })
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) throw new Error(data.error || 'Create failed');
    setMsg('createMsg', 'Created ' + username, false);
    document.getElementById('createUserForm').reset();
    await loadUsers();
  } catch (err) {
    setMsg('createMsg', err.message, true);
  }
});

loadUsers();
</script>
</body>
</html>
